<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset='utf-8' />
    <title>（実験・演習用）</title>
    <link rel="stylesheet" href="交通.css">
    <style>
        body {
            font-size: 30px; 
        }
        p {
            font-size: 35px; 
        }
        h1 {
            font-size: 30px;
        }
        .image-container {
            display: flex;
            align-items: center; 
        }
        img {
            width: 400px;
            margin-right: 20px;
        }
    </style>
</head>

<body>

    <h1>津田沼の交通</h1>

    <p>このページでは津田沼から都心への交通手段をご紹介‼</p>

    <div class="image-container">
        <img src="IMG_1142.JPG" alt="東京・横浜まで一本で朝夕は始発もあり！総武快速線">
        <span>総武快速線は錦糸町や東京駅、さらには横浜駅まで乗り換えなしの総武線。錦糸町駅まで20分!東京駅まで約30分で、朝夕は始発もあって座れます。</span>
    </div>

    <div class="image-container">
        <img src="IMG_0730.JPG" alt="新宿まで乗り換えなし総武線各駅停車">
        <span>中央・総武線各駅停車は秋葉原駅や新宿駅へ乗り換えなし！ディズニーリゾート最寄り駅舞浜駅に停まる京葉線との乗り換え駅の西船橋にも停まります。朝夕は門前仲町・日本橋方面東京メトロ東西線にも直通!始発もあって座れます。</span>
    </div>

    <div class="image-container">
        <img src="IMG_0812.JPG" alt="上野駅や地下鉄に直通で浅草まで１本で">
        <span>京成線は京成上野駅や都営浅草線にも直通し浅草・新橋まで一本で！成田空港や千葉方面にも乗り換えなし！</span>
    </div>

    <div class="image-container">
        <img src="DSC_4075.jpg" alt="松戸・鎌ヶ谷へは新京成">
        <span>新京成線は松戸や習志野・鎌ヶ谷まで京成津田沼から始発で座って乗り換えなし！</span>
    </div>



</body>
</html>

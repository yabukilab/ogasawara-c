    <h1>津田沼って安全なの？</h1>

    <p>このページでは津田沼の治安（事件や事故）の件数などを参考に津田沼が安全かを見ていきましょう‼</p>

    <div class="image-container">
        <img src="画像1.jpg" alt="画像1の説明">

    </div>

    <div class="image-container">

    <h3>津田沼の地域特性</h3>
    <p>津田沼は、交通の便が良く、周辺に多くの商業施設があるため、住みやすい地域として人気です。</p>

    <h3>地域のイベント</h3>
    <p>毎年行われる地域の祭りやイベントは、住民の交流の場となっており、地域コミュニティを活性化しています。</p>
